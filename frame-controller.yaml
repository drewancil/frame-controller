substitutions:
  name: "frame-controller"
  friendly_name: Frame Controller
  comment: Ex-link interface for Samsung The Frame TV | Olimex ESP32-POE-16GB
  area: Utility Room
  # olimex esp32-poe uext interface: tx: GPIO4 | rx: GPIO36
  # Use ColorControl app to enter service menu if necessary - https://github.com/Maassoft/ColorControl
  # control->sub option.  Make sure rs232 jack: uart / EXT LINK: On / does not need USB Serial to be on if using the 3.5mm port

packages:
  common: !include modules/devices/olimex-esp32-poe-idf.yaml

preferences:
  # the default of 1min is far too short-flash chip rated for approx 100k writes
  flash_write_interval: "8h"

esp32:
  flash_size: 16MB

ethernet:
  manual_ip:
    static_ip: 192.168.4.162
    subnet: 255.255.255.0
    gateway: 192.168.4.1
    dns1: 192.168.4.175

logger:
  level: DEBUG  # don't remove DEBUG - makes uart stream available in esphome logstream
  logs:
    component: ERROR  # suppress component took too long messages

i2c: !remove

esphome:
  includes:
    - hfiles/sagebrush_string.h
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish:
          id: get_status
          state: "Enable debugging switch in UI to see command log"
      - script.execute: poll_tv

#------------------ uart: samsung ex-link interface - rs232 for tv control and monitoring of state
uart:
  id: uart_bus
  tx_pin: GPIO4
  rx_pin: GPIO36
  baud_rate: 9600
  debug:
    direction: BOTH
    dummy_receiver: true
    sequence:
      - lambda: |-
          // if sw_uart_debug_logging is On: print incoming messages in log for reverse engineering/debug
          if (id(sw_uart_debug_logging).state) {
            UARTDebug::log_hex(direction, bytes, ':');
            if (direction == uart::UART_DIRECTION_RX)
              id(get_status).publish_state(format_hex_pretty(bytes));
          }
      - lambda: >
          if (direction == uart::UART_DIRECTION_RX) {
            if (bytes.size() == 16) {                  // the get status hex should be 16 bits long
              auto key = bytes[8];
              auto value = bytes[12];

              //------- power: 0x00
              if (key == 0x00) {

                // On: 0x05
                if (value == 0x05) {
                  if (!id(sw_tv_power).state)
                    id(sw_tv_power).publish_state(true);
                  if (!id(power_status).state)
                    id(power_status).publish_state(true);
                }

                // Standby: 0x04 | Off: 0x08
                else if (value == 0x04 || value == 0x08) {
                  if (id(sw_tv_power).state)
                    id(sw_tv_power).publish_state(false);
                  if (!id(power_status).state)
                    id(power_status).publish_state(false);
                }
              }

              //-------- volume: 0x01
              else if (key == 0x01) {
                if (id(volume_status).state != value)
                  id(volume_status).publish_state(value);
              }

              //--------- mute: 0x02
              else if (key == 0x02) {
                // 0x00 - not muted | 0x01 - muted
                if (value == 0x00 && id(mute_status).state)
                  id(mute_status).publish_state(false);
                else if (value == 0x01 && !id(mute_status).state)
                  id(mute_status).publish_state(true);
              }

              //--------channel: 0x03 -  channel/major/minor (x12=18,x01=1,x02=2)
              else if (key == 0x03) {
                uint8_t channelprimary = value;
                uint8_t channelmajor = bytes[13];
                uint8_t channelminor = bytes[14];
                id(channel_status).publish_state(to_string(channelprimary)+"-"+to_string(channelmajor)+"-"+to_string(channelminor));
              }

              //---------- source: 0x04
              else if (key == 0x04) {

                if (value == 0x00) {
                   // source tv: 03.0C.F1.03.0C.F5.08.F0.04.00.00.F1.00.00.00.0F (16)
                  if (id(source_status).state != "TV")
                    id(source_status).publish_state("TV");
                  if (id(select_source).current_option() != "TV")
                    id(select_source).publish_state("TV");
                }
                else if (value == 0x47) {
                  if (id(source_status).state != "HDMI1")
                    id(source_status).publish_state("HDMI1");
                  if (id(select_source).current_option() != "HDMI1")
                    id(select_source).publish_state("HDMI1");
                }
                else if (value == 0x48) {
                  if (id(source_status).state != "HDMI2")
                    id(source_status).publish_state("HDMI2");
                  if (id(select_source).current_option() != "HDMI2")
                    id(select_source).publish_state("HDMI2");
                }
                else if (value == 0x49) {
                  if (id(source_status).state != "HDMI3")
                    id(source_status).publish_state("HDMI3");
                  if (id(select_source).current_option() != "HDMI3")
                    id(select_source).publish_state("HDMI3");
                }
                else if (value == 0x50) {
                  if (id(source_status).state != "HDMI4")
                    id(source_status).publish_state("HDMI4");
                  if (id(select_source).current_option() != "HDMI4")
                    id(select_source).publish_state("HDMI4");
                }
                else if (value == 0x1C) {
                  if (id(source_status).state != "AV1")
                    id(source_status).publish_state("AV1");
                  if (id(select_source).current_option() != "AV1")
                    id(select_source).publish_state("AV1");
                }
                else if (value == 0x29) {
                  if (id(source_status).state != "Component1")
                    id(source_status).publish_state("Component1");
                  if (id(select_source).current_option() != "Component1")
                    id(select_source).publish_state("Component1");
                }
              }

              //----------- picture mode: 0x07 - picture/art modes
              // hdmi1/sheild: dynamic/filmmaker mode/movie/standard | hdmi2/pc: entertain/graphic

              else if (key == 0x07) {
                //ESP_LOGD("uart_receive","PICTURE MODE key/value %d : %d", key, value);
                std::string src = id(source_status).state;
                auto art_switch = id(sw_art_mode).state;

                // Art Mode: 0x08
                if (value == 0x08) {
                  if (!art_switch)
                    id(sw_art_mode).publish_state(true);
                }
                else {
                  if (art_switch)
                    id(sw_art_mode).publish_state(false);
                }

                // Dynamic: 0x00 - Shield
                if (value == 0x00) {
                  if (id(picture_mode).state != "Dynamic")
                    id(picture_mode).publish_state("Dynamic");
                }

                // Standard: 0x01 - Shield
                else if (value == 0x01) {
                  if (src == "HDMI1" && id(picture_mode).state != "Standard")
                    id(picture_mode).publish_state("Standard");
                  else if (src == "HDMI2" && id(picture_mode).state != "Graphic[SDR]")
                    id(picture_mode).publish_state("Graphic[SDR]");
                }

                // Movie: 0x02 - Shield
                else if (value == 0x02) {
                  if (id(picture_mode).state != "Movie")
                    id(picture_mode).publish_state("Movie");
                }

                // Entertain[HDR]: 0x03 - PC(HDR)
                else if (value == 0x03) {
                  if (id(picture_mode).state != "Entertain[HDR]")
                    id(picture_mode).publish_state("Entertain[HDR]");
                }

                // Graphic[HDR]: 0x04 - PC(HDR)
                else if (value == 0x04) {
                  if (id(picture_mode).state != "Graphic[HDR]")
                    id(picture_mode).publish_state("Graphic[HDR]");
                }

                // Entertain: 0x05 - PC(STD)
                else if (value == 0x05) {
                  if (id(picture_mode).state != "Entertain[SDR]")
                    id(picture_mode).publish_state("Entertain[SDR]");
                }

                // Hobgoblin: 0x06
                else if (value == 0x06) {
                  if (id(picture_mode).state != "Hobgoblin-06")
                    id(picture_mode).publish_state("Hobgoblin-06");
                }

                // Hobgoblin: 0x07
                else if (value == 0x07) {
                  if (id(picture_mode).state != "Hobgoblin-07")
                    id(picture_mode).publish_state("Hobgoblin-07");
                }

                // Art Mode: 0x08 - although this is already handled above, this is the value that is sent when art mode is selected
                else if (value == 0x08) {
                  if (id(picture_mode).state != "Art Mode")
                    id(picture_mode).publish_state("Art Mode");
                }

                // Hobgoblin: 0x09
                else if (value == 0x09) {
                  if (id(picture_mode).state != "Hobgoblin-09")
                    id(picture_mode).publish_state("Hobgoblin-09");
                }

                // Home Menu: 0x19 - home menu showing (25 base-10)
                else if (value == 0x19) {
                  if (id(picture_mode).state != "Home Menu")
                    id(picture_mode).publish_state("Home Menu");
                }

                else {
                  ESP_LOGW("uart_receive","Unknown Picture Mode %d : %d", key, value);
                }
              }

              //----------------------- brightness: 0x0A
              else if (key == 0xA) {
                int bright = value * 2;                           // multiply to change scale from 0-50 to 0-100 (%)
                int slider = id(num_disp_bright).state;
                if (bright != slider) {                          // update the number only if there is a change
                  auto call = id(num_disp_bright).make_call();
                  call.set_value(bright);
                  call.perform();
                }
              }
              else {
                ESP_LOGW("uart_receive","Unused key/value %d : %d", key, value);
              }
            }
          }

#------------------------------- select
select:
  id: select_source
  platform: template
  name: Source Select
  icon: mdi:hdmi-port
  options:
    - "HDMI1"
    - "HDMI2"
    - "HDMI3"
    - "HDMI4"
    - "TV"
  initial_option: "HDMI2"
  optimistic: true
  on_value:
    then:
      - lambda: |-
          ESP_LOGI("select_source","Source chosen: %s (index %d)", x.c_str(), i);
          if (x == "HDMI1")
            id(btn_source_hdmi1).press();
          else if (x == "HDMI2")
            id(btn_source_hdmi2).press();
          else if (x == "HDMI3")
            id(btn_source_hdmi3).press();
          else if (x == "HDMI4")
            id(btn_source_hdmi4).press();
          else if (x == "TV")
            id(btn_source_tv).press();

#------------------------------------------ number
number:
  # number: test numbers (ex-link) - used for changing queries to send to the tv to reverse engineer
  - id: command_1
    platform: template
    name: "Test: Command 1"
    min_value: 0
    max_value: 255
    mode: BOX
    step: 1
    restore_value: True
    initial_value: 0
    optimistic: true

  - id: command_2
    platform: template
    name: "Test: Command 2"
    min_value: 0
    max_value: 255
    mode: BOX
    step: 1
    restore_value: True
    initial_value: 0
    optimistic: true

  - id: command_3
    platform: template
    name: "Test: Command 3"
    min_value: 0
    max_value: 255
    mode: BOX
    step: 1
    restore_value: True
    initial_value: 0
    optimistic: true

  - id: command_value
    platform: template
    name: "Test: Command Value"
    min_value: 0
    max_value: 255
    mode: BOX
    step: 1
    restore_value: True
    initial_value: 0
    optimistic: true

  # number: num_disp_bright - the brightness of 'The Frame' TV - gets updated from interval poll of tv
  - id: num_disp_bright
    platform: template
    name: Display Brightness
    icon: mdi:television-ambient-light
    internal: False
    update_interval: 20s
    min_value: 0
    max_value: 100
    mode: SLIDER
    unit_of_measurement: "%"
    optimistic: True
    step: 1
    set_action:
      - uart.write: !lambda |-
          int bright = x / 2;           // convert from percent (100) to max 50 the tv takes
          uint8_t head_1 = 8;           // fixed header
          uint8_t head_2 = 34;          // fixed header
          uint8_t cmd_1 = 11;           // menu: picture
          uint8_t cmd_2 = 1;            // submenu: brightness
          uint8_t cmd_3 = 0;            // submenu2:
          uint8_t cmd_value = bright;   // value
          uint8_t cmd_checksum = 256 - (head_1 + head_2 + cmd_1 + cmd_2 + cmd_3 + cmd_value);
          return {head_1, head_2, cmd_1, cmd_2, cmd_3, cmd_value, cmd_checksum};

#----------------------------------------------- binary_sensor
binary_sensor:
  # binary_sensor: power_status (ex-link) -  holds mute status of tv
  - id: power_status
    platform: template
    name: Power Status
    icon: mdi:power

  # binary_sensor: mute_status (ex-link) -  holds mute status of tv
  - id: mute_status
    platform: template
    name: Mute Status
    icon: mdi:volume-mute

#----------------------------------------------- button - many commands not needed for this project left disabled by defsult for possible future use
button:
  # button: test_command - used for testing sending custom commands to the tv by changing the command_x values in gui and pressing send
  - id: test_command
    platform: template
    name: Test Command
    on_press:
      then:
        - lambda: 'ESP_LOGI("btn_test_command","TEST COMMAND");'
        - uart.write: !lambda |-
            const uint8_t head_1 = 0x08;  // fixed header
            const uint8_t head_2 = 0x22;  // fixed header
            const uint8_t cmd_1 = static_cast<uint8_t>(id(command_1).state);  // 240 (F0) seems to be the query parameter?
            const uint8_t cmd_2 = static_cast<uint8_t>(id(command_2).state);  // last experimented with 7 here
            const uint8_t cmd_3 = static_cast<uint8_t>(id(command_3).state);
            const uint8_t cmd_value = static_cast<uint8_t>(id(command_value).state);

            const uint16_t sum = static_cast<uint16_t>(head_1) + head_2 + cmd_1 + cmd_2 + cmd_3 + cmd_value;
            const uint8_t cmd_checksum = static_cast<uint8_t>(256 - sum);  // 7th byte

            return {head_1, head_2, cmd_1, cmd_2, cmd_3, cmd_value, cmd_checksum};

  # button: btn_poll_tv - poll the tv - used for testing, not really used in production
  - id: btn_poll_tv
    platform: template
    name: "Test: Poll TV"
    icon: mdi:update
    on_press:
      then:
        - script.execute: poll_tv

  #---------------------------------- button: get commands
  # Get Command:
  # TV Reaction
  # Success / Fail _F1_ _Success_
  # Data Length    _8_
  # Command        _F0_ _0_ _0_ _0_
  # Data Value     _5_ _0_ _0_
  # Category       _Power_
  # Current State  _Normal Mode_

  - platform: uart
    uart_id: uart_bus
    name: Get Power
    icon: mdi:update
    data: [0x08, 0x22, 0xF0, 0x00, 0x00, 0x00, 0xE6]
    disabled_by_default: true

  - platform: uart
    uart_id: uart_bus
    name: Get Brightness
    icon: mdi:update
    data: [0x08, 0x22, 0xF0, 0x0A, 0x00, 0x00, 0xDC]
