#----------------------------------------------------- switch
switch:
  # switch: sw_tv_power (ex-link) - turns tv on/off
  - id: sw_tv_power
    platform: template
    name: Power
    icon: mdi:power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x00, 0x00, 0x00, 0x02, 0xd4]      # send power-on command
      - delay: 200ms                                                # must have a delay
      - lambda: 'id(tv_status).publish_state("On");'
      - script.execute: poll_tv                                     # immediatly poll the tv to update important states without waiting for interval
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x00, 0x00, 0x00, 0x01, 0xd5]      # send power-off command
      - delay: 200ms
      - switch.turn_off: sw_art_mode
      - lambda: 'id(tv_status).publish_state("Off");'
      - delay: 500ms
      - script.execute: poll_tv

  # switch: sw_art_mode - turns art mode on/off
  - id: sw_art_mode
    platform: template
    name: Art Mode
    icon: mdi:image-outline
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - if:             # if the tv is off, turn it on
          condition:
            - switch.is_off: sw_tv_power
          then:
            - switch.turn_on: sw_tv_power
            - delay: 5s
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x0e, 0x01, 0xb1]
      - lambda: 'id(picture_mode).publish_state("Art Mode");'
      - lambda: 'id(tv_status).publish_state("Art Mode");'
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x0e, 0x00, 0xb2]

  # switch: sw_ambient_mode - turns ambient mode on/off
  - id: sw_ambient_mode
    platform: template
    name: Ambient Mode
    icon: mdi:image-outline
    optimistic: True              # not updated by polling
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x10, 0x01, 0xaf]
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x10, 0x00, 0xb0]

  # switch: sw_ambient_light_sensor
  - id: sw_ambient_light_sensor
    platform: template
    name: Ambient Eco Sensor
    icon: mdi:sprout-outline
    optimistic: True              # not updated by polling
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x0d, 0x01, 0xb2]
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x0d, 0x00, 0xb3]

  # switch: sw_hdr_plus
  - id: sw_hdr_plus
    platform: template
    name: HDR+
    icon: mdi:television-shimmer
    optimistic: True              # not updated by polling
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x0b, 0x01, 0xb4]
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0b, 0x0b, 0x00, 0xb5]

  # switch: sw_motion_lighting
  - id: sw_motion_lighting
    platform: template
    name: Motion Lighting
    icon: mdi:motion-outline
    optimistic: True              # not updated by polling
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x07, 0x11, 0x01, 0xb2]
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x07, 0x11, 0x00, 0xb3]

  # switch: sw_auto_motion_plus
  - id: sw_auto_motion_plus
    platform: template
    name: Auto Motion Plus
    icon: mdi:motion-outline
    optimistic: True      # not updated by polling
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0a, 0x06, 0x02, 0xb9]
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0b, 0x0a, 0x06, 0x00, 0xbb]

  # switch: sw_cmd_result_osd (ex-link) - toggles the annoying dimming of screen and acknowledgement of each command issued via exlink
  - id: sw_cmd_result_osd
    platform: template
    name: Command Result OSD
    icon: mdi:overscan
    optimistic: True       # not updated by polling
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    turn_on_action:
      - uart.write: [0x08, 0x22, 0x0e, 0x01, 0x00, 0x01, 0xc6]
    turn_off_action:
      - uart.write: [0x08, 0x22, 0x0e, 0x01, 0x00, 0x00, 0xc7]

  # switch: sw_auto_poll_tv - tv will be polled at the interval in interval section below.  Usually just turned off during development to test commands
  - id: sw_auto_poll_tv
    platform: template
    name: Auto Poll TV
    icon: mdi:update
    optimistic: True
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

  # switch: sw_uart_debug_logging - should we display all uart traffic to log
  - id: sw_uart_debug_logging
    platform: template
    name: UART Debug Logging
    icon: mdi:bug-check-outline
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

#------------------------------------------------------------- sensor
sensor:
  - id: !remove poe_voltage

  # sensor: volume_status
  - id: volume_status
    platform: template
    name: Volume Status
    icon: mdi:volume-high
    accuracy_decimals: 0
    unit_of_measurement: "%"

#---------------------------------------------------------- text_sensor
text_sensor:
  # text_sensor: tv_status - state of TV
  - id: tv_status
    platform: template
    name: TV Status
    icon: mdi:television
    entity_category: diagnostic
    update_interval: 15s
    lambda: |-
      if (id(sw_tv_power).state) {
        if (id(sw_art_mode).state) {
          if (id(tv_status).state != "Art Mode")
            return {"Art Mode"};
          else
            return {};
        }
        else {
          if (id(tv_status).state != "On")
            return {"On"};
          else
            return {};
        }
      }
      else {
        if (id(tv_status).state != "Off")
          return {"Off"};
        else
          return {};
      }

  # text_sensor: source_status - input source of the tv
  - id: source_status
    platform: template
    name: Source Status
    icon: mdi:source-branch
    entity_category: diagnostic
    on_value:
      then:
        - lambda: |-
            if (x == id(select_source).current_option())
              return;   // no change
            ESP_LOGI("source_status", "Source changed to: %s", x.c_str());
            id(select_source).publish_state(x);

  # text_sensor: picture_mode - which picture mode / art mode
  - id: picture_mode
    platform: template
    name: Picture Mode
    icon: mdi:image-outline
    entity_category: diagnostic

  # text_sensor: channel_status - channel status of tv
  - id: channel_status
    platform: template
    name: Channel Status
    icon: mdi:television-guide
    disabled_by_default: true
    entity_category: diagnostic

  # text_sensor: get_status (ex-link) - puts the most recent response to a query in a text_sensor - for reverse engineering/testing
  - id: get_status
    platform: template
    name: Get Command Log
    icon: mdi:math-log
    entity_category: diagnostic

#------------------------------------------------------- script
script:
  # script: poll_tv - ask the tv to deliver state updates for items below
  - id: poll_tv
    then:
      - uart.write: [0x08, 0x22, 0xF0, 0x00, 0x00, 0x00, 0xE6]           # 0: query power state
      - delay: 250ms
      - if:
          condition:
            - switch.is_on: sw_tv_power
          then:
            - uart.write: [0x08, 0x22, 0xF0, 0x01, 0x00, 0x00, 0xE5]     # 1: query volume state
            - delay: 170ms
            - uart.write: [0x08, 0x22, 0xF0, 0x02, 0x00, 0x00, 0xE4]     # 2: query mute state
            - delay: 170ms
            # channel is #3
            - uart.write: [0x08, 0x22, 0xF0, 0x04, 0x00, 0x00, 0xE2]     # 4: query source
            - delay: 170ms
            - uart.write: [0x08, 0x22, 0xF0, 0x07, 0x00, 0x00, 0xDF]     # 7: picture mode status / includes art mode
            - delay: 170ms
            - uart.write: [0x08, 0x22, 0xF0, 0x0A, 0x00, 0x00, 0xDC]     # 10: current brightness of tv
            - delay: 170ms

#------------------------------------------------------- interval
interval:
  - interval: 5s  # poll the tv every x seconds for state update
    then:
      - lambda: |-
          if (id(sw_auto_poll_tv).state) {         // if auto-poll switch is on
            id(poll_tv)->execute();                // poll the tv states
          }
